version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: liturgybridge_db
    restart: unless-stopped
    # Bind only to localhost (127.0.0.1) for security in development.
    # In production, we do not expose this port to the host at all (or keep it private).
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-liturgybridge}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
